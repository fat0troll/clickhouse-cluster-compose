services:
  clickhouse-keeper-01: &keeper-base
    image: "clickhouse/clickhouse-keeper:${CHKVER:-latest-alpine}"
    container_name: clickhouse-keeper-01
    hostname: clickhouse-keeper-01
    restart: unless-stopped
    environment:
      KEEPER_ID: 1
    volumes:
      - type: bind
        source: ./config/keeper/keeper_config.xml
        target: /etc/clickhouse-keeper/keeper_config.xml
      - type: bind
        source: ./data/chk-01/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/chk-01/
        target: /var/log/
    networks:
      - clickhouse-network
  clickhouse-keeper-02:
    <<: *keeper-base
    container_name: clickhouse-keeper-02
    hostname: clickhouse-keeper-02
    environment:
      KEEPER_ID: 2
    volumes:
      - type: bind
        source: ./data/chk-02/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/chk-02/
        target: /var/log/
  clickhouse-keeper-03:
    <<: *keeper-base
    container_name: clickhouse-keeper-03
    hostname: clickhouse-keeper-03
    environment:
      KEEPER_ID: 3
    volumes:
      - type: bind
        source: ./data/chk-03/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/chk-03/
        target: /var/log/

  clickhouse-01-01: &clickhouse-base
    image: "clickhouse/clickhouse-server:${CHVER:-latest}"
    container_name: clickhouse-01-01
    hostname: clickhouse-01-01
    restart: unless-stopped
    environment:
      CH_SHARD: 01
    volumes:
      - type: bind
        source: ./config/clickhouse/config.d/
        target: /etc/clickhouse-server/config.d/
      - type: bind
        source: ./config/clickhouse/users.d/
        target: /etc/clickhouse-server/users.d/
      - type: bind
        source: ./data/ch-01-01/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/ch-01-01/
        target: /var/log/
    networks:
      - clickhouse-network
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    depends_on:
      - clickhouse-keeper-01
      - clickhouse-keeper-02
      - clickhouse-keeper-03
    healthcheck:
      test: wget \
        --no-verbose \
        --tries=1 \
        --spider \
        localhost:8123/replicas_status || exit 1
      interval: 40s
      timeout: 30s
      retries: 3
      start_period: 3s
  clickhouse-01-02:
    <<: *clickhouse-base
    container_name: clickhouse-01-02
    hostname: clickhouse-01-02
    ports:
      - "127.0.0.1:8124:8123"
      - "127.0.0.1:9001:9000"
    environment:
      CH_SHARD: 01
    volumes:
      - type: bind
        source: ./data/ch-01-02/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/ch-01-02/
        target: /var/log/
  clickhouse-02-01:
    <<: *clickhouse-base
    container_name: clickhouse-02-01
    hostname: clickhouse-02-01
    ports:
      - "127.0.0.1:8125:8123"
      - "127.0.0.1:9002:9000"
    environment:
      CH_SHARD: 02
    volumes:
      - type: bind
        source: ./data/ch-02-01/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/ch-02-01/
        target: /var/log/
  clickhouse-02-02:
    <<: *clickhouse-base
    container_name: clickhouse-02-02
    hostname: clickhouse-02-02
    ports:
      - "127.0.0.1:8126:8123"
      - "127.0.0.1:9003:9000"
    environment:
      CH_SHARD: 02
    volumes:
      - type: bind
        source: ./data/ch-02-02/
        target: /var/lib/clickhouse
      - type: bind
        source: ./logs/ch-02-02/
        target: /var/log/

networks:
  clickhouse-network:
    name: clickhouse-compose-network
